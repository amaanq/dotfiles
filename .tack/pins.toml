[shorturls]
gh = "github:{path}"
amaan = "github:amaanq/{path}"
manic = "github:manic-systems/{path}"

[all_follow]
# top level pins
nixpkgs = ["nixpkgs-23-11", "nixpkgs-stable", "nixpkgs-regression"]
fenix = "fenix"
rust-overlay = "rust-overlay"
flake-parts = "flake-parts"
niri-src = ["niri-stable", "niri-unstable"]
nix = "nix-src"
darwin = "nix-darwin"

# transitive inputs
crane = "crane"
git-hooks = ["git-hooks-nix"]
nixpkgs-lib = "nixpkgs-lib"
rust-analyzer-src = "rust-analyzer"
treefmt-nix = "treefmt-nix"
xwayland-satellite = [
	"xwayland-satellite-stable",
	"xwayland-satellite-unstable",
]

# stuff solely to have all inputs follow --------------------------------------

[inputs.flake-parts]
url = "gh:hercules-ci/flake-parts"

[inputs.rust-overlay]
url = "gh:oxalica/rust-overlay"

# core toolchain --------------------------------------------------------------

[inputs.nixpkgs]
url = "gh:nixos/nixpkgs/nixpkgs-unstable"

[inputs.fenix]
url = "gh:nix-community/fenix"

# darwinSLOP ------------------------------------------------------------------

[inputs.nix-darwin]
url = "gh:LnL7/nix-darwin"

[inputs.nix-homebrew]
url = "gh:zhaofengli/nix-homebrew"

[inputs.homebrew-core]
url = "gh:homebrew/homebrew-core"
flake = false

[inputs.homebrew-cask]
